server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── SPA routing ──────────────────────────────────────────────────────────
    # Fall back to index.html for any path that does not resolve to a real file
    # so that TanStack Router handles client-side navigation on page refresh or
    # deep-link access.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Cache-Control for hashed assets ──────────────────────────────────────
    # Vite appends a content hash to every JS/CSS/font filename (e.g.
    # main-D4bF3kLm.js). When the content changes the hash changes and the
    # browser fetches a fresh copy; until then it can safely serve the cached
    # version indefinitely.
    location ~* \.(js|css|woff2?|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Images and other media get a shorter TTL because they may not be hashed.
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|avif)$ {
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # ── Compression ──────────────────────────────────────────────────────────
    gzip on;
    gzip_comp_level 6;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        image/svg+xml;
}
